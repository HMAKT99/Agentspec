name: mdpact

on:
  pull_request:
    paths:
      - "CLAUDE.md"
      - "AGENTS.md"
      - "**/*.mcp.md"
      - "mdpact.config.*"
  push:
    branches: [main]

jobs:
  mdpact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: HMAKT99/Agentspec/apps/action@v0.1.0
        with:
          fail-below: "70"
          # Set to "true" and provide the relevant API-key secrets to also run
          # the behavior-prediction engine on this PR.
          run-behavior-tests: "false"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
